<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The cooler version of LinkedIn | Contact</title>
<link rel="stylesheet" href="styles/style.css" />
</head>
<body>

    <header>
        <h1>Contacting a Desktop Services Technician</h1>
        
        <nav>
<ul>
<li><a href="Project1Index.html">About</a></li>
<li><a href="Project1Skills.html">Skills</a></li>
<li><a href="Project1Projects.html">Projects</a></li>
<li><a href="Project1Contact.html">Contact</a></li>
</ul>
        </nav>
    </header>

    <main>
        
            <h2>Give Me A Ring</h2>
            
<form action="#" method="POST">
                
                <div>
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" minlength="2" required>
                </div>
                
                <div>
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div>
                    <label for="topic">What's this about?</label>
                    <select id="topic" name="topic">
                        <option value="job">Job Info</option>
                        <option value="hardware">Hardware / IT Troubleshooting</option>
                        <option value="coding">Powershell & HTML Projects</option>
                        <option value="other">I have a different question.</option>
                        
                    </select>
                </div>

                <fieldset>
                    <legend>Preferred Contact Method</legend>
                    <div>
                        <input type="radio" id="contact-email" name="preferred-contact" value="email">
                        <label for="contact-email">Email</label>
                    </div>
                    <div>
                        <input type="radio" id="contact-phone" name="preferred-contact" value="phone">
                        <label for="contact-phone">Phone</label>
                    </div>
                </fieldset>
                
                <div>
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" minlength="10" required></textarea>
                </div>
                
                <input type="submit" value="Summon Me Now">
            </form>
        
    </main>
    
    <footer>
        <p><a href="https://www.linkedin.com/in/gabriel-parks-47a04a35b?utm_source=share&utm_campaign=share_via&utm_content=profile&utm_medium=android_app" target="_blank">My LinkedIn Profile</a><br>
        &copy;</p>
    </footer>

</body>
</html>
